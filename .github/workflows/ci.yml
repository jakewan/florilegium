name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # go-version-file keeps the Go version single-sourced in go.mod;
      # setup-go@v6 enables module caching by default.
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go build ./...

      - run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # golangci-lint-action needs the version explicitly; this is the one
      # intentional duplication of the pin in mise.toml.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
