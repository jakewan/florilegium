name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # dorny/paths-filter reads the PR's changed-file list via the API on
  # pull_request events.
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate the Go jobs on whether the change can affect a Go build/lint outcome.
  # A job skipped via job-level `if:` is reported as "skipped" = passing for
  # required status checks, so a doc-only PR stays mergeable once test/lint are
  # required — without the workflow-level `paths:` filter that would leave
  # required checks permanently pending.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      release_config: ${{ steps.filter.outputs.release_config }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'
            # Includes Go sources/go.mod so a rename of the serverVersion symbol
            # or the cmd/ path (which the snapshot build resolves) trips the gate,
            # not just edits to the release config files themselves.
            release_config:
              - '**/*.go'
              - 'go.mod'
              - '.goreleaser.yaml'
              - 'cliff.toml'
              - '.github/workflows/release.yml'
              - '.github/workflows/ci.yml'

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # go-version-file keeps the Go version single-sourced in go.mod;
      # setup-go@v6 enables module caching by default.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - run: go build ./...

      - run: go test -race ./...

  lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      # golangci-lint-action needs the version explicitly; this is the one
      # intentional duplication of the pin in mise.toml.
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.11.3

  # Validate the release config on PRs that could affect it. `goreleaser check`
  # is only a syntax linter, so a single-target snapshot *build* follows — it
  # resolves the ldflags serverVersion symbol and so catches a rename that
  # `check` alone would pass and a real release would fail. Make this a required
  # check so a red result blocks (the `if:` skip-passing covers unrelated PRs,
  # like the go jobs).
  release-config:
    needs: detect-changes
    if: needs.detect-changes.outputs.release_config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      # Pinned to the v2 line via the action's documented range form.
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          install-only: true
          version: "~> v2"

      - run: goreleaser check

      - run: goreleaser build --snapshot --single-target --clean
