name: Release

# A pushed v* tag is the single release gate (see the release ritual in
# .claude/rules/pr-conventions.md). This builds, signs, attests, and publishes.
on:
  push:
    tags: ["v*"]

# Serialize releases on the same ref so a re-pushed tag can't race two
# `goreleaser release --clean` runs over one dist/ and one GitHub Release.
# Never cancel: aborting a half-published release is worse than serializing.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release and upload assets
  id-token: write # cosign keyless signing + provenance OIDC
  attestations: write # SLSA build provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # GoReleaser needs full tag history

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # install-only so the steps below can call goreleaser directly. Pinned to
      # the v2 line (mise.toml pins the exact patch for local dev); the action's
      # documented range form avoids a version-string format mismatch.
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          install-only: true
          version: "~> v2"

      # Fail fast: a tag push bypasses PR CI, so the release-prep commit's config
      # is validated here before any build/sign/publish side effect.
      - name: Validate release config
        run: goreleaser check

      # Release notes come from the CHANGELOG.md section for this tag — the
      # single source of truth (git-cliff writes it at release prep). Start after
      # the matched header; stop at the next section heading or the first
      # link-reference line, so the trailing [x.y.z]: refs are not swept in.
      - name: Extract release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { capture = 1; next }
            capture && /^## / { exit }
            capture && /^\[.*\]:/ { exit }
            capture { print }
          ' CHANGELOG.md | sed -e '/./,$!d' | sed -e ':a' -e '/^\n*$/{$d;N;ba}' > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No release notes found for $GITHUB_REF_NAME in CHANGELOG.md"
            exit 1
          fi

      - name: Release
        run: goreleaser release --clean --release-notes=RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SLSA build provenance over the published artifacts.
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
